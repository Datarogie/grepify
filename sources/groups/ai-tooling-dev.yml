# AI tooling / dev sources - frameworks / infra / how-to - scrubbed from the trendcloud.io /sources AI list (GRP-07).
#
# PROVENANCE: source rows (name, feed URL, kind) copied from trendcloud.io's
# public 118-source AI list. Categorized per the playbook rubric
# (research = papers/labs/academic; business = funding/market/enterprise;
# tooling-dev = frameworks/infra/how-to; ambiguous -> tooling-dev).
#
# LIVENESS: feeds are NOT pinged here - this build environment blocks outbound
# HTTPS to feed hosts. These are trendcloud's actively-aggregated feeds, so they
# ship enabled; per-source health tracking (fetch_log / GRP-16) FLAGS any that
# fail persistently but never auto-disables (v1 non-goal, PRD §2) - a manual
# triage pass reads that history and flips `enabled: false` here (T5, GRP-30).
# `grepify validate` checks schema + duplicate ids/url_hashes only (live
# pinging is deferred to GRP-10/11 by design).
