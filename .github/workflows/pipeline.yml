name: pipeline

# GRP-06: cron pipeline - ingest -> extract -> (gated) digest -> build+deploy.
# Combines PRD F-OPS-02's "pipeline" and "deploy" workflows into one job: the
# Pages deploy needs the artifact this same run just built, and PRD §5's
# architecture diagram already draws build+deploy as one arrow.
#
# Data-branch design (repo ruleset revision): `main` now requires PRs with no
# bypass, so the pipeline's JSONL truth commits can't land there. This job
# checks out `main` for code as usual, then checks out a dedicated `data`
# branch as a worktree at ./data (scripts/ensure-data-branch.sh, bootstraps it
# on first run) and commits/pushes only that branch, with the default
# GITHUB_TOKEN. See docs/process.md for the full design.
#
# Never triggered by `push`, so it cannot self-retrigger via the data commit
# it makes (belt-and-suspenders with `[skip ci]` on that commit + validate's
# `push: branches: [main]` scoping - pushes to `data` can't reach `validate`
# at all, see validate.yml). `concurrency` serializes overlapping cron/manual
# runs so they can't race on the data commit (PRD §5) - a second, independent
# guard from `fetch-depth: 1`'s shallow-clone rebase path in commit_data,
# which stays correct even without the concurrency group. `fetch-depth: 1`
# also keeps checkouts cheap (PRD §9 CI-minutes budget).
on:
  schedule:
    # 3x/day, spread across the day; the ~05:00-08:00 America/Edmonton slot
    # (see grepify.digest.gating / `make digest-gate`) is whichever of these
    # lands there given DST.
    - cron: "0 13,19,1 * * *"
  workflow_dispatch:
    inputs:
      force_digest:
        description: "Run the daily + weekly digest now, bypassing the time-of-day gate (for on-demand testing; scheduled runs stay gated)."
        type: boolean
        default: false
      run_remediation:
        description: "One-off O1 data remediation (docs/prev1-hardening.md): run `grepify maintain renormalize` against the data branch before ingest, cleaning pre-#19 HTML-contaminated keyword rows. Idempotent - safe to leave off by default."
        type: boolean
        default: false

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        # The cron pipeline needs the E5 optional extra (youtube-transcript-api
        # for transcripts); `make check`/`validate` stay on the lean `make
        # install` (PRD §13 - transcripts are a best-effort enrichment, kept out
        # of the core install).
        run: make install-pipeline

      - name: Configure git identity for data commits
        run: |
          git config user.name "grepify-bot"
          git config user.email "grepify-bot@users.noreply.github.com"

      - name: Checkout data branch (worktree at ./data)
        run: make data-branch

      - name: Digest gate
        id: gate
        run: make digest-gate >> "$GITHUB_OUTPUT"

      # O1 (docs/prev1-hardening.md): one-off cleanup of keyword rows
      # extracted before #19's HTML-strip fix. Runs before ingest so today's
      # ingest/extract/digest steps see corrected data. Idempotent - a clean
      # corpus rewrites and re-extracts nothing.
      - name: Remediate HTML-contaminated keywords (O1, one-off)
        if: github.event.inputs.run_remediation == 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make maintain-renormalize

      - name: Ingest
        # Transcripts need no secret (F-ING-03, absence-tolerant); a transcript
        # blocked from CI IPs simply leaves transcript_ref null.
        run: make ingest

      # Feed triage (#39): capture per-source status + error-class every run,
      # so new breakage is caught going forward (docs/feed-triage.md). Runs
      # after Ingest so `fetch_log` is fresh; `make doctor` reads the data
      # branch worktree at ./data (grepify doctor defaults --data-root data).
      # Read-only and network/secret-free: it never touches the LLM secrets and
      # exits 0, so it never breaks a deploy.
      - name: Feed triage report (doctor)
        run: |
          echo '### Feed triage (doctor)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          make doctor >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Extract
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make extract

      # Per-category digests (GRP-41/42). The gate (GRP-45, America/Edmonton +
      # DST-aware) fires daily on the morning run and weekly on Monday morning.
      # These are the only digest steps that touch the LLM secrets (never the
      # `validate` workflow, PRD §5); an LLM that is down/over budget degrades
      # to a template digest inside the command (PRD §9/§13). A manual
      # `workflow_dispatch` with `force_digest=true` runs both regardless of the
      # gate, so a digest can be produced on demand for testing.
      - name: Daily digest
        if: steps.gate.outputs.daily == 'true' || github.event.inputs.force_digest == 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make digest-daily

      - name: Weekly digest
        if: steps.gate.outputs.weekly == 'true' || github.event.inputs.force_digest == 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make digest-weekly

      - name: Commit pipeline data (to the `data` branch)
        run: make commit-data

      # GRP-35: `make build` now renders the real site into `public/` (site =
      # main code + data-branch state, rebuilt from JSONL truth in the worktree
      # at ./data). GREPIFY_BASE_PATH is the project-Pages sub-path
      # (https://<owner>.github.io/<repo>/), derived from the repo name so a
      # fork deploys correctly with no code change (cloneability, PRD §5).
      - name: Build site
        env:
          GREPIFY_BASE_PATH: "/${{ github.event.repository.name }}/"
        run: make build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
