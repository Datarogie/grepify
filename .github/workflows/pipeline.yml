name: pipeline

# GRP-06/GRP-64: scheduled/manual production pipeline with explicit trust
# boundaries. Validation/build jobs are read-only; only data-update can push the
# data branch; only deploy-pages receives Pages/OIDC; only notify-failure can
# write issues. workflow_dispatch production runs are guarded to the repository
# default branch before any production credentials or write permissions are used.
on:
  schedule:
    - cron: "0 13,19,1 * * *"
  workflow_dispatch:
    inputs:
      force_digest:
        description: "Run the daily + weekly digest now, bypassing the time-of-day gate (for on-demand testing; scheduled runs stay gated)."
        type: boolean
        default: false
      run_remediation:
        description: "One-off O1 data remediation (docs/prev1-hardening.md): run `grepify maintain renormalize` against the data branch before ingest."
        type: boolean
        default: false

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions: {}

jobs:
  guard-production-ref:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Require default branch for manual production runs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "workflow_dispatch production runs must be started from ${{ github.event.repository.default_branch }}." >&2
            exit 1
          fi

  validate-source:
    needs: guard-production-ref
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: make install-pipeline
      - name: Validate config
        run: make validate

  prepare-data:
    needs: validate-source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: make install-pipeline
      - name: Checkout data branch read-only
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch --depth=1 origin data
            git worktree add --detach data FETCH_HEAD
          else
            mkdir data
          fi
      - name: Data-size guardrail (GRP-63)
        run: |
          set -o pipefail
          make datasize | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Digest gate
        id: gate
        run: make digest-gate >> "$GITHUB_OUTPUT"
      - name: Record gate outputs
        run: |
          mkdir -p pipeline-state
          printf 'daily=%s\nweekly=%s\n' '${{ steps.gate.outputs.daily }}' '${{ steps.gate.outputs.weekly }}' > pipeline-state/gate.env
      - name: Upload prepared data snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: prepared-data
          path: |
            data
            pipeline-state/gate.env

  run-pipeline:
    needs: prepare-data
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      truth_ok: ${{ steps.truth.outputs.ok }}
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Download prepared data snapshot
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: prepared-data
      - name: Preserve last committed truth snapshot
        run: |
          mkdir -p data
          cp -a data data-original
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: make install-pipeline
      - name: Remediate HTML-contaminated keywords (O1, one-off)
        if: github.event.inputs.run_remediation == 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make maintain-renormalize
      - name: Ingest
        id: ingest
        continue-on-error: true
        run: make ingest
      - name: Feed triage report (doctor)
        run: |
          echo '### Feed triage (doctor)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          make doctor >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Extract
        id: extract
        continue-on-error: true
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make extract
      - name: Read digest gate outputs
        id: gatefile
        run: |
          . pipeline-state/gate.env
          echo "daily=$daily" >> "$GITHUB_OUTPUT"
          echo "weekly=$weekly" >> "$GITHUB_OUTPUT"
      - name: Daily digest
        id: daily_digest
        continue-on-error: true
        if: github.event.inputs.force_digest == 'true' || steps.gatefile.outputs.daily == 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make digest-daily
      - name: Weekly digest
        id: weekly_digest
        continue-on-error: true
        if: github.event.inputs.force_digest == 'true' || steps.gatefile.outputs.weekly == 'true'
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make digest-weekly
      - name: Check upstream pipeline health
        id: truth
        if: always()
        env:
          INGEST: ${{ steps.ingest.outcome }}
          EXTRACT: ${{ steps.extract.outcome }}
          DAILY_DIGEST: ${{ steps.daily_digest.outcome }}
          WEEKLY_DIGEST: ${{ steps.weekly_digest.outcome }}
        run: |
          if [ "$INGEST" = "failure" ] || [ "$EXTRACT" = "failure" ] ||
             [ "$DAILY_DIGEST" = "failure" ] || [ "$WEEKLY_DIGEST" = "failure" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Reset data directory to last committed truth
        if: steps.truth.outputs.ok != 'true'
        run: |
          rm -rf data
          cp -a data-original data
      - name: Upload pipeline data result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pipeline-data-result
          path: data

  data-update:
    needs: run-pipeline
    if: needs.run-pipeline.outputs.truth_ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download pipeline data result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import stat
          import urllib.error
          import urllib.parse
          import urllib.request
          import zipfile
          from pathlib import Path

          REDIRECT_STATUSES = {302, 303, 307, 308}
          ALLOWED_ARCHIVE_HOST_SUFFIXES = (".blob.core.windows.net", ".actions.githubusercontent.com")
          ALLOWED_ARCHIVE_HOSTS = {
              "objects.githubusercontent.com",
              "github-releases.githubusercontent.com",
              "productionresultssa.blob.core.windows.net",
          }


          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None


          def validate_signed_archive_url(location):
              if not location:
                  raise SystemExit("artifact archive redirect did not include a Location header")
              parsed = urllib.parse.urlparse(location)
              if parsed.scheme != "https":
                  raise SystemExit("artifact archive redirect must use https")
              if parsed.username or parsed.password:
                  raise SystemExit("artifact archive redirect must not include userinfo")
              if not parsed.hostname or not parsed.netloc:
                  raise SystemExit("artifact archive redirect has malformed authority")
              host = parsed.hostname.lower().rstrip(".")
              if host not in ALLOWED_ARCHIVE_HOSTS and not host.endswith(ALLOWED_ARCHIVE_HOST_SUFFIXES):
                  raise SystemExit("artifact archive redirect host is not in the allowed GitHub storage set")
              return location


          def safe_member_path(destination, member_name):
              member = Path(member_name)
              if member.is_absolute() or ".." in member.parts:
                  raise SystemExit(f"unsafe artifact path: {member_name}")
              if any(part == ".git" for part in member.parts):
                  raise SystemExit(f"artifact must not contain .git metadata: {member_name}")
              target = (destination / member).resolve()
              destination_resolved = destination.resolve()
              if target != destination_resolved and destination_resolved not in target.parents:
                  raise SystemExit(f"artifact path escapes destination: {member_name}")
              return target


          def safe_extract_zip(archive_path, destination):
              destination.mkdir(parents=True, exist_ok=True)
              with zipfile.ZipFile(archive_path) as zip_file:
                  members = zip_file.infolist()
                  for info in members:
                      mode = info.external_attr >> 16
                      if stat.S_ISLNK(mode) or stat.S_ISCHR(mode) or stat.S_ISBLK(mode) or stat.S_ISFIFO(mode):
                          raise SystemExit(f"artifact member has unsafe file type: {info.filename}")
                      safe_member_path(destination, info.filename)
                  for info in members:
                      target = safe_member_path(destination, info.filename)
                      if info.is_dir():
                          target.mkdir(parents=True, exist_ok=True)
                          continue
                      target.parent.mkdir(parents=True, exist_ok=True)
                      with zip_file.open(info) as src, target.open("wb") as dst:
                          dst.write(src.read())


          run_id = os.environ["GITHUB_RUN_ID"]
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              artifacts = json.load(response)["artifacts"]
          matches = [artifact for artifact in artifacts if artifact["name"] == "pipeline-data-result"]
          if not matches:
              raise SystemExit("pipeline-data-result artifact not found")
          download_url = matches[0]["archive_download_url"]
          api_req = urllib.request.Request(
              download_url,
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
          )
          opener = urllib.request.build_opener(NoRedirect)
          try:
              opener.open(api_req, timeout=30)
          except urllib.error.HTTPError as exc:
              if exc.code not in REDIRECT_STATUSES:
                  raise SystemExit(f"unexpected artifact archive redirect status: {exc.code}") from exc
              signed_url = validate_signed_archive_url(exc.headers.get("Location"))
          else:
              raise SystemExit("artifact archive endpoint did not redirect")
          archive_req = urllib.request.Request(signed_url)
          with urllib.request.urlopen(archive_req, timeout=60) as response, open("artifact.zip", "wb") as out:
              out.write(response.read())
          safe_extract_zip(Path("artifact.zip"), Path("data-result"))
          PY
      - name: Commit pipeline data (to the `data` branch)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init data
          git -C data remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          auth_payload="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          auth_header="AUTHORIZATION: basic ${auth_payload}"
          if git -C data -c http.https://github.com/.extraheader="$auth_header" ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git -C data -c http.https://github.com/.extraheader="$auth_header" fetch --depth=1 origin data
            git -C data checkout -B data FETCH_HEAD
            find data -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          else
            git -C data checkout --orphan data
            git -C data rm -rf . >/dev/null 2>&1 || true
          fi
          cp -a data-result/. data/
          git -C data config user.name "grepify-bot"
          git -C data config user.email "grepify-bot@users.noreply.github.com"
          git -C data add -A
          if git -C data diff --cached --quiet; then
            echo "nothing to commit"
            unset GITHUB_TOKEN auth_payload auth_header
            exit 0
          fi
          git -C data commit -m "chore(data): pipeline run [skip ci]"
          git -C data -c http.https://github.com/.extraheader="$auth_header" push origin HEAD:data
          unset GITHUB_TOKEN auth_payload auth_header

  build-site:
    needs: [run-pipeline, data-update]
    if: always() && needs.run-pipeline.result != 'cancelled' && (needs.data-update.result == 'success' || needs.data-update.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Download pipeline data result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pipeline-data-result
          path: data
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: make install-pipeline
      - name: Build site
        env:
          GREPIFY_BASE_PATH: "/${{ github.event.repository.name }}/"
        run: make build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy-pages:
    needs: build-site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  final-status:
    needs: [guard-production-ref, validate-source, prepare-data, run-pipeline, data-update, build-site, deploy-pages]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Evaluate production final status
        env:
          TRUTH_OK: ${{ needs.run-pipeline.outputs.truth_ok }}
          GUARD_RESULT: ${{ needs.guard-production-ref.result }}
          VALIDATE_RESULT: ${{ needs.validate-source.result }}
          PREPARE_RESULT: ${{ needs.prepare-data.result }}
          RUN_PIPELINE_RESULT: ${{ needs.run-pipeline.result }}
          DATA_UPDATE_RESULT: ${{ needs.data-update.result }}
          BUILD_RESULT: ${{ needs.build-site.result }}
          DEPLOY_RESULT: ${{ needs.deploy-pages.result }}
        run: python scripts/pipeline_final_status.py

  notify-failure:
    needs: [final-status]
    if: failure() && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Notify on failure
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const title = "pipeline failing";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: found } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} type:issue state:open in:title "${title}"`,
            });
            const existing = found.items.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Failed again: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Scheduled pipeline run failed: ${runUrl}`,
              });
            }
