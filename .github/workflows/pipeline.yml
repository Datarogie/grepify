name: pipeline

# GRP-06: cron pipeline — ingest -> extract -> (gated) digest -> build+deploy.
# Never triggered by `push`, so it cannot self-retrigger via the data commit
# it makes at the end (belt-and-suspenders with `[skip ci]` + validate's
# `paths-ignore: data/**`, see validate.yml). `concurrency` serializes
# overlapping cron/manual runs so they can't race on the data commit (PRD §5);
# `fetch-depth: 1` keeps checkouts cheap (PRD §9 CI-minutes budget).
on:
  schedule:
    # 3x/day, spread across the day; the ~05:00-08:00 America/Edmonton slot
    # (see scripts/digest-gate.sh) is whichever of these lands there given DST.
    - cron: "0 13,19,1 * * *"
  workflow_dispatch: {}

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: make install

      - name: Configure git identity for data commits
        run: |
          git config user.name "grepify-bot"
          git config user.email "grepify-bot@users.noreply.github.com"

      - name: Digest gate
        id: gate
        run: make digest-gate >> "$GITHUB_OUTPUT"

      - name: Ingest
        run: make ingest

      - name: Extract
        run: make extract

      - name: Daily digest
        if: steps.gate.outputs.daily == 'true'
        run: make digest

      - name: Weekly digest
        if: steps.gate.outputs.weekly == 'true'
        run: make digest

      - name: Commit pipeline data
        env:
          GIT_BRANCH: ${{ github.ref_name }}
        run: make commit-data

      - name: Build
        run: make build

      - name: Assemble site
        run: make site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
