name: validate

# GRP-06: MR/PR gate. The job below is named `validate` (not `check`) so the
# required-status-check name pinned in the `main` ruleset matches exactly.
#
# Data-branch revision: pipeline data commits now go to a dedicated `data`
# branch, not `main` (see pipeline.yml), so `push: branches: [main]` alone
# already means this workflow structurally can't be retriggered by them.
# `paths-ignore: data/**` and the `[skip ci]` on those commits are kept as
# belt-and-suspenders in case a future workflow ever watches more branches.
on:
  pull_request:
    paths-ignore:
      - "data/**"
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
  workflow_dispatch: {}

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads and never pushes (unlike
# pipeline.yml), so it doesn't need the org/repo default token scope.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: make install

      - name: Lint, typecheck, test
        run: make check

      # GRP-58: dependency vulnerability scan against uv.lock (pip-audit via
      # uvx, pinned to the project's Python). References zero secrets - only
      # reads the already-resolved lock file and queries public vulnerability
      # data (PyPI/OSV), same posture as any other outbound-network lint step.
      - name: Dependency audit
        run: make audit

      - name: Validate config
        run: make validate
