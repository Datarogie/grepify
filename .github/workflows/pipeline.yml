name: pipeline

# GRP-06: cron pipeline - ingest -> extract -> (gated) digest -> build+deploy.
# Combines PRD F-OPS-02's "pipeline" and "deploy" workflows into one job: the
# Pages deploy needs the artifact this same run just built, and PRD §5's
# architecture diagram already draws build+deploy as one arrow.
#
# Data-branch design (repo ruleset revision): `main` now requires PRs with no
# bypass, so the pipeline's JSONL truth commits can't land there. This job
# checks out `main` for code as usual, then checks out a dedicated `data`
# branch as a worktree at ./data (scripts/ensure-data-branch.sh, bootstraps it
# on first run) and commits/pushes only that branch, with the default
# GITHUB_TOKEN. See docs/process.md for the full design.
#
# Never triggered by `push`, so it cannot self-retrigger via the data commit
# it makes (belt-and-suspenders with `[skip ci]` on that commit + validate's
# `push: branches: [main]` scoping - pushes to `data` can't reach `validate`
# at all, see validate.yml). `concurrency` serializes overlapping cron/manual
# runs so they can't race on the data commit (PRD §5) - a second, independent
# guard from `fetch-depth: 1`'s shallow-clone rebase path in commit_data,
# which stays correct even without the concurrency group. `fetch-depth: 1`
# also keeps checkouts cheap (PRD §9 CI-minutes budget).
on:
  schedule:
    # 3x/day, spread across the day; the ~05:00-08:00 America/Edmonton slot
    # (see scripts/digest-gate.sh) is whichever of these lands there given DST.
    - cron: "0 13,19,1 * * *"
  workflow_dispatch: {}

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install
        run: make install

      - name: Configure git identity for data commits
        run: |
          git config user.name "grepify-bot"
          git config user.email "grepify-bot@users.noreply.github.com"

      - name: Checkout data branch (worktree at ./data)
        run: make data-branch

      - name: Digest gate
        id: gate
        run: make digest-gate >> "$GITHUB_OUTPUT"

      - name: Ingest
        run: make ingest

      - name: Extract
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: make extract

      # Both steps call the same stub command today (`grepify digest` doesn't
      # yet distinguish daily/weekly - that's GRP-41/42); kept as separate
      # gated steps so the Monday-morning run visibly records two runs, one
      # per digest kind, matching the shape GRP-41/42 will fill in.
      - name: Daily digest
        if: steps.gate.outputs.daily == 'true'
        run: make digest

      - name: Weekly digest
        if: steps.gate.outputs.weekly == 'true'
        run: make digest

      - name: Commit pipeline data (to the `data` branch)
        run: make commit-data

      # GRP-35: `make build` now renders the real site into `public/` (site =
      # main code + data-branch state, rebuilt from JSONL truth in the worktree
      # at ./data). GREPIFY_BASE_PATH is the project-Pages sub-path
      # (https://<owner>.github.io/<repo>/), derived from the repo name so a
      # fork deploys correctly with no code change (cloneability, PRD §5).
      - name: Build site
        env:
          GREPIFY_BASE_PATH: "/${{ github.event.repository.name }}/"
        run: make build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
