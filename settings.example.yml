# settings.example.yml - copy to sources/settings.yml and adjust.
#
# This is the cloneability template (PRD §5). No secrets ever live here or in
# sources/settings.yml - the LLM key, X session cookies, and Slack tokens are
# CI masked variables only. See docs/setup.md.

llm:
  # Named profiles (PRD §5). Personal v1 uses gemini-free; work profiles activate
  # only in the remote-labs fork. The active profile's budget gate is enforced.
  active_profile: gemini-free
  max_items_per_call: 25 # batch titles+summaries per extraction call
  profiles:
    gemini-free:
      endpoint: openai-compat
      model: gemini-3.1-flash-lite
      max_calls_per_run: 40
    claude:
      endpoint: anthropic
      model: claude-haiku-4-5
      max_calls_per_run: 40

windows:
  cloud_days: 7 # trailing window for the keyword cloud
  digest_daily_hours: 24
  digest_weekly: iso_week
  keyword_days: 30 # trailing window for keyword detail pages (F-SIT-04)
  keyword_min_mentions: 3 # a keyword gets a page at >= this many mentions in that window

# Rising-detection + digest shaping (PRD §8 F-TRD-03 / F-DIG-01/03). All optional
# (these are the defaults); tune without a code change.
digest:
  enabled: true # pause switch: set false to freeze `digest` (no LLM calls, no files) during data remediation
  daily_lookback_days: 7 # catch-up window: a daily run backfills any missing digest over the last N days
  rising_min_count: 3 # a keyword is "rising" only at >= this count ...
  rising_ratio: 3.0 # ... and count / previous-window count >= this ratio
  min_items: 10 # skip (do not fail) a category digest below this many items
  daily_top_keywords: 12 # top-N keywords fed to the daily digest prompt
  weekly_top_keywords: 20 # weekly is slightly longer
  items_per_keyword: 3 # example item titles/summaries per keyword in the prompt

limits:
  transcript_max_chars: 60000
  transcript_langs: [en]

# Digest day boundary + cron gating are pinned to this zone, not UTC (PRD §5).
timezone: America/Edmonton
