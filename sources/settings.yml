# Live settings for this deployment. No secrets (PRD §5). See settings.example.yml.
llm:
  active_profile: gemini-free
  max_items_per_call: 25
  profiles:
    gemini-free:
      endpoint: openai-compat
      model: gemini-3.1-flash-lite
      max_calls_per_run: 40
    claude:
      endpoint: anthropic
      model: claude-haiku-4-5
      max_calls_per_run: 40

windows:
  cloud_days: 7
  digest_daily_hours: 24
  digest_weekly: iso_week
  keyword_days: 30
  keyword_min_mentions: 3

digest:
  rising_min_count: 3
  rising_ratio: 3.0
  min_items: 10
  daily_top_keywords: 12
  weekly_top_keywords: 20
  items_per_keyword: 3

limits:
  transcript_max_chars: 60000
  transcript_langs: [en]

timezone: America/Edmonton
