# GitLab CI - mirror of the GitHub workflows (GRP-36, PRD §8 F-OPS-02/03).
#
# Portability by design: all CI logic lives in `make` targets (F-OPS-03), so
# this file only wires triggers → the same targets `.github/workflows/*.yml`
# call. Two flows, matching GitHub:
#   * validate  - on merge requests + default-branch pushes → make check/validate
#   * pages     - on schedule (+ manual "web") → ingest→extract→(gated)digest→
#                 build, publishing public/ to GitLab Pages
#
# Data-branch design (GRP-06) carries over unchanged: the pipeline writes JSONL
# truth into the `data` branch worktree at ./data via `make data-branch` /
# `make commit-data`; the default branch never receives a data commit.
#
# Secrets (LLM_BASE_URL, LLM_API_KEY, and a push token for the data branch) are
# GitLab CI/CD variables (masked), never in the repo (PRD §5). The scheduled
# `pages` job is the only one that consumes them - merge-request pipelines never
# reference a secret, mirroring the GitHub split.

stages:
  - validate
  - pages

default:
  image: ghcr.io/astral-sh/uv:python3.12-bookworm
  before_script:
    - make install

# MR + default-branch gate (mirrors validate.yml). Never touches a secret.
validate:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
  script:
    - make check
    # GRP-58: dependency vulnerability scan against uv.lock (pip-audit via
    # uvx, pinned to the project's Python). References zero secrets - only
    # reads the already-resolved lock file and queries public vulnerability
    # data (PyPI/OSV), same posture as any other outbound-network lint step.
    - make audit
    - make validate

# Scheduled pipeline + Pages deploy folded into one job (mirrors pipeline.yml,
# which folds build+deploy per GRP-06). GitLab publishes the `public/` artifact
# of a job named `pages` to Pages automatically.
pages:
  stage: pages
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web" # on-demand run from the UI
  resource_group: pipeline # serialize overlapping runs (≈ GH concurrency group)
  # The pipeline needs the E5 optional extra (youtube-transcript-api for
  # transcripts); `validate` stays on the lean `make install` from
  # `default.before_script`. Transcripts need no secret (F-ING-03).
  before_script:
    - make install-pipeline
  variables:
    # project-Pages sub-path (https://<group>.gitlab.io/<project>/), from the
    # project name so a fork deploys with no code change (cloneability, PRD §5).
    GREPIFY_BASE_PATH: "/$CI_PROJECT_NAME/"
  script:
    - git config user.name "grepify-bot"
    - git config user.email "grepify-bot@users.noreply.gitlab.com"
    - make data-branch
    # GRP-63: sum items/keywords JSONL + transcripts under the data worktree
    # every run, before ingest/extract spend any network/LLM budget. Warns
    # (exit 0) at 100 MB, fails the job at 200 MB. GitLab has no per-step job
    # summary UI like GitHub's $GITHUB_STEP_SUMMARY, so the line just lands in
    # the job log - same `make` target either way (F-OPS-03 portability).
    - make datasize
    - eval "$(make digest-gate)" # sets shell vars daily=/weekly=
    - make ingest
    - make extract
    # Per-category digests (GRP-41/42), gated by the America/Edmonton clock
    # (GRP-45). LLM CI/CD variables are consumed only here, never in `validate`.
    # Run a manual pipeline with FORCE_DIGEST=true (a CI/CD variable) to bypass
    # the gate on demand for testing; scheduled runs stay gated (mirrors the
    # GitHub workflow_dispatch force_digest input).
    - if [ "$daily" = "true" ] || [ "$FORCE_DIGEST" = "true" ]; then make digest-daily; fi
    - if [ "$weekly" = "true" ] || [ "$FORCE_DIGEST" = "true" ]; then make digest-weekly; fi
    - make commit-data
    - make build
  artifacts:
    paths:
      - public
