<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<title>{% block title %}{{ meta.title }}{% endblock %}</title>
<link rel="stylesheet" href="{{ meta.asset('style.css') }}">
<script src="{{ meta.asset('theme.js') }}"></script>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
<div class="masthead-row">
<a class="brand" href="{{ meta.base_path }}">grepify<span class="caret" aria-hidden="true"></span></a>
<button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" hidden>theme: dark</button>
</div>
<nav class="site-nav" aria-label="Primary">
{% for link in nav %}
<a href="{{ meta.base_path }}{{ link.href }}"{% if link.key == ctx.active %} aria-current="page"{% endif %}>{{ link.label }}</a>
{% endfor %}
</nav>
</header>
<main id="main" class="site-main">
{% block content %}{% endblock %}
</main>
<footer class="site-footer">
<span>Generated {{ meta.generated_at }}</span>
<span>run {{ meta.run_id }}</span>
</footer>
</body>
</html>
