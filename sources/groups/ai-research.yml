# AI research sources — papers / labs / academic (GRP-07).
#
# PROVENANCE + LIVENESS CAVEAT (read before trusting `enabled`):
# The trendcloud.io /sources scrape and the per-feed liveness check that GRP-07
# calls for could NOT be performed in this build environment — outbound HTTPS is
# locked to package registries + GitHub (trendcloud.io and every feed host return
# 403). This is therefore a best-effort curated seed of the canonical AI-research
# feeds trendcloud is known to aggregate, NOT a verified scrape.
#   enabled: true  -> URL string is the well-known canonical feed (still UN-pinged)
#   enabled: false -> URL path uncertain or source defunct (see inline comment)
# A real liveness pass (ping each feed, flip enabled to match) must run in a
# networked env before these are relied on — this matches the E0 design, which
# defers live feed pinging to the fetcher (GRP-10/11). `grepify validate` here
# only checks schema + duplicate ids/url_hashes.
group: ai-research
name: AI Research
category: ai
enabled: true
builtin: true
sources:
  - id: arxiv-cs-ai
    kind: rss
    name: arXiv cs.AI
    url: https://rss.arxiv.org/rss/cs.AI
    added_at: "2026-07-08"
